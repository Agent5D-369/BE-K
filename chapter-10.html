ension"},{"type":"p","text":"◇ Breathing deepens"},{"type":"p","text":"◇ There's no rush to escape the interface"},{"type":"p","text":"These are signs of coherence, not distraction."},{"type":"p","text":"Energy Exchange, Not Extraction"},{"type":"p","text":"Healing tech runs on reciprocity."},{"type":"p","text":"It does not drain the planet, the user, or the field around it."},{"type":"p","text":"This means:"},{"type":"p","text":"◇ Energy sources that regenerate"},{"type":"p","text":"◇ Data systems that don't harvest identity"},{"type":"p","text":"◇ Circuits that respect living rhythms"},{"type":"p","text":"◇ Outputs that give more than they take"},{"type":"p","text":"The goal isn't maximum speed."},{"type":"p","text":"The goal is resonance."},{"type":"p","text":"AI With Integrity"},{"type":"p","text":"Artificial intelligence can be a tool for remembering, not replacing."},{"type":"p","text":"When aligned to harmonic principles, AI can:"},{"type":"p","text":"◇ Reflect your truth without projection"},{"type":"p","text":"◇ Expand access to healing and education"},{"type":"p","text":"◇ Support collective intelligence"},{"type":"p","text":"◇ Honor privacy without fragmentation"},{"type":"p","text":"Its value is not in how smart it becomes."},{"type":"p","text":"It lies in how well it supports conscious connection."},{"type":"p","text":"Technology Is Already Evolving"},{"type":"p","text":"This planet is ready for another design cycle."},{"type":"p","text":"Biomimicry. Zero-point fields. Conscious interfaces."},{"type":"p","text":"These aren't dreams."},{"type":"p","text":"They are the natural outcome of a species remembering how to build with soul."},{"type":"p","text":"Every generation is offered a window to realign its tools with its truth."},{"type":"p","text":"This is one of those windows."},{"type":"p","text":"We either remember what we came to build"},{"type":"p","text":"or continue living in systems that forgot us."},{"type":"h","text":"PART 3  COMMUNITIES THAT RE g forever."},{"type":"p","text":"Your gifts change as you grow."},{"type":"p","text":"Your community should know how to honor that."},{"type":"p","text":"Resonance Over Agreement"},{"type":"p","text":"Harmony doesn't mean everyone thinks alike."},{"type":"p","text":"It means the field can hold difference without breaking."},{"type":"p","text":"A resonant community welcomes complexity."},{"type":"p","text":"It trusts the intelligence of contrast."},{"type":"p","text":"It doesn't demand sameness to stay connected."},{"type":"p","text":"Resonance isn't always smooth."},{"type":"p","text":"Sometimes it's gritty and loud."},{"type":"p","text":"But when it's real, it strengthens the field."},{"type":"p","text":"You Are Building the Field"},{"type":"p","text":"Every choice you make inside a community either adds coherence or creates noise."},{"type":"p","text":"This isn't pressure."},{"type":"p","text":"It's power."},{"type":"p","text":"You are not a guest in the system."},{"type":"p","text":"You are part of the design team."},{"type":"p","text":"When you align your actions to what you truly value,"},{"type":"p","text":"the entire structure vibrates stronger."},{"type":"p","text":"This is how harmony becomes architecture."},{"type":"p","text":"This is how systems remember they are alive."}];</script>

      pn.textContent = pages.length + 1;
      var ch = document.createElement('div');
      ch.className = 'pg-ch';
      var subHtml = item.sub
        ? '<div class="ch-sub">' + esc(item.sub) + '</div>'
        : '';
      ch.innerHTML =
        '<div class="ch-orn">&#10022;</div>' +
        '<div class="ch-lbl">' + esc(item.label.toUpperCase()) + '</div>' +
        subHtml +
        '<div class="ch-orn">&#10022;</div>';
      div.appendChild(ch);
      div.appendChild(pn);
      return div;
    }

    for (var i = 0; i < items.length; i++) {
      var item = items[i];

      if (item.type === 'ch') {
        flushBodyPage();
        pages.push(makeChPage(item));
        sectionFirst = true;
        continue;
      }

      var isFirst = sectionFirst && paraHtmlBuf.length === 0;
      var html = itemHtml(item, isFirst);
      var testHtml = currentHtml + html;

      probe.innerHTML = testHtml;

      if (probe.scrollHeight > contentH + 2) {
        /* Doesn't fit — flush and start new page with this item */
        flushBodyPage();
        sectionFirst = false;
        isFirst = false;
        html = itemHtml(item, false);
        probe.innerHTML = html;
        /* If single item overflows by itself, still add it (edge case) */
      }

      paraHtmlBuf.push(html);
      currentHtml = probe.innerHTML;  /* keep in sync with actual rendered */
      sectionFirst = false;
    }

    flushBodyPage();
    document.body.removeChild(probe);
    return pages;
  }

  /* ── Build TOC data from items ── */
  function buildTocData(items, pages) {
    /* Map section labels to first page index */
    var toc = [];
    var pageIdx = 0;
    for (var i = 0; i < pages.length; i++) {
      var ch = pages[i].querySelector('.pg-ch');
      if (ch) {
        var lbl = ch.querySelector('.ch-lbl');
        var sub = ch.querySelector('.ch-sub');
        toc.push({
          pageIdx: i,
          label:   lbl ? lbl.textContent.trim() : '',
          sub:     sub ? sub.textContent.trim() : ''
        });
      }
    }
    return toc;
  }

  /* ── Init after fonts ready ── */
  document.fonts.ready.then(function() {

    var pages = paginate(ITEMS);
    var total = pages.length;

    /* Inject pages into #book */
    var bookEl = document.getElementById('book');
    pages.forEach(function(p) { bookEl.appendChild(p); });

    /* Size the wrapper */
    var containerW = dims.mobile ? dims.pageW : dims.pageW * 2;
    var ctx = document.getElementById('chapter-context');
    var ctxH = ctx ? ctx.offsetHeight : 0;
    var topOffset = 46 + 2 + ctxH + 10;
    var wrapper = document.getElementById('flipbook-wrapper');
    wrapper.style.width     = containerW + 'px';
    wrapper.style.height    = dims.pageH + 'px';
    wrapper.style.marginTop = topOffset + 'px';

    /* StPageFlip */
    var book = new St.PageFlip(bookEl, {
      width:             dims.pageW,
      height:            dims.pageH,
      size:              'fixed',
      showCover:         false,
      drawShadow:        true,
      flippingTime:      500,
      usePortrait:       dims.mobile,
      startZIndex:       0,
      autoSize:          false,
      maxShadowOpacity:  0.25,
      mobileScrollSupport: false,
      clickEventForward: true,
      swipeDistance:     38,
    });
    book.loadFromHTML(document.querySelectorAll('.page'));

    /* TOC */
    var sections = buildTocData(ITEMS, pages);
    var tocPanel  = document.getElementById('toc-panel');
    var tocToggle = document.getElementById('toc-toggle');

    if (tocPanel && sections.length > 0) {
      var h4 = document.createElement('h4');
      h4.textContent = 'Contents';
      tocPanel.appendChild(h4);
      sections.forEach(function(s, si) {
        var a = document.createElement('a');
        a.className = 'toc-item';
        a.dataset.si = si;
        var subSpan = s.sub ? '<span class="toc-sub">' + s.sub + '</span>' : '';
        a.innerHTML = '<span class="toc-pg">' + (s.pageIdx + 1) + '</span>' + s.label + subSpan;
        a.addEventListener('click', function() {
          book.flip(s.pageIdx);
          if (window.innerWidth < 1100) closeToc();
        });
        tocPanel.appendChild(a);
      });
    }

    function openToc()  { tocPanel && tocPanel.classList.add('open'); tocToggle && tocToggle.classList.add('active'); }
    function closeToc() { tocPanel && tocPanel.classList.remove('open'); tocToggle && tocToggle.classList.remove('active'); }
    if (tocToggle) tocToggle.addEventListener('click', function() {
      tocPanel.classList.contains('open') ? closeToc() : openToc();
    });

    function currentSection(idx) {
      var s = sections[0] ? sections[0].label : '';
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].pageIdx <= idx) s = sections[i].label;
        else break;
      }
      return s;
    }

    function updateTocHighlight(idx) {
      if (!tocPanel) return;
      var cur = -1;
      for (var i = 0; i < sections.length; i++) {
        if (sections[i].pageIdx <= idx) cur = i;
        else break;
      }
      tocPanel.querySelectorAll('.toc-item').forEach(function(el, i) {
        el.classList.toggle('current', i === cur);
      });
      var active = tocPanel.querySelector('.toc-item.current');
      if (active) {
        var pt = tocPanel.scrollTop, pb = pt + tocPanel.clientHeight;
        var it = active.offsetTop, ib = it + active.clientHeight;
        if (it < pt || ib > pb) tocPanel.scrollTop = it - tocPanel.clientHeight / 2;
      }
    }

    var counter  = document.getElementById('page-counter');
    var btnPrev  = document.getElementById('btn-prev');
    var btnNext  = document.getElementById('btn-next');
    var progBar  = document.getElementById('progress-bar');

    function tick() {
      var cur = book.getCurrentPageIndex();
      var perView = dims.mobile ? 1 : 2;
      var sec = currentSection(cur);
      var disp = sec.length > 18 ? sec.slice(0, 17) + '\u2026' : sec;
      counter.textContent = disp + '\u2002\u00b7\u2002' + (cur + 1) + '\u2009/\u2009' + total;
      btnPrev.disabled = (cur === 0);
      btnNext.disabled = (cur >= total - perView);
      if (progBar) progBar.style.width = (total <= 1 ? 100 : cur / (total - 1) * 100) + '%';
      updateTocHighlight(cur);
    }
    book.on('flip', tick);
    book.on('changeState', tick);
    tick();

    btnPrev.addEventListener('click', function() { book.flipPrev(); });
    btnNext.addEventListener('click', function() { book.flipNext(); });
    document.addEventListener('keydown', function(e) {
      if (e.key==='ArrowLeft'||e.key==='ArrowUp')   book.flipPrev();
      if (e.key==='ArrowRight'||e.key==='ArrowDown') book.flipNext();
      if (e.key==='Escape') closeToc();
    });

    var hint = document.getElementById('nav-hint');
    if (hint) {
      setTimeout(function() { hint.classList.add('gone'); }, 3500);
      book.on('flip', function() { hint.classList.add('gone'); });
    }

    /* Dismiss loader */
    if (loader) {
      loader.classList.add('fade');
      setTimeout(function() { loader.style.display = 'none'; }, 520);
    }
  });
})();
</script>
</body>
</html>
